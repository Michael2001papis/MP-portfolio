<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="MP — Michael Papismedov | MP-PORTFOLIO-ID: 2025-MP-001">
    <title>404 — לא נמצא | MP Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; direction: rtl; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 2rem;
            overflow: hidden;
        }
        .err-404 {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        .err-404 span {
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }
        .err-404 span:nth-child(1) { animation-delay: 0s; }
        .err-404 span:nth-child(2) { animation-delay: 0.1s; }
        .err-404 span:nth-child(3) { animation-delay: 0.2s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            margin: 1rem 0 0.5rem 0;
            font-weight: 500;
        }
        p {
            color: rgba(255,255,255,0.85);
            margin-bottom: 2rem;
            text-align: center;
        }
        .btn-home {
            display: inline-block;
            padding: 0.9rem 2rem;
            background: #fff;
            color: #1e3a5f;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .floating {
            position: fixed;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }
        .floating:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .floating:nth-child(2) { top: 20%; right: 20%; animation-delay: 0.5s; }
        .floating:nth-child(3) { bottom: 25%; left: 25%; animation-delay: 1s; }
        .floating:nth-child(4) { bottom: 15%; right: 15%; animation-delay: 1.5s; }
        .floating:nth-child(5) { top: 50%; left: 5%; animation-delay: 2s; }
        .floating:nth-child(6) { top: 60%; right: 8%; animation-delay: 2.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .footer-404 {
            position: absolute;
            bottom: 1rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
        .footer-404 a { color: #fff; }
    </style>
</head>
<body>
    <div class="floating">🔍</div>
    <div class="floating">📄</div>
    <div class="floating">💻</div>
    <div class="floating">✨</div>
    <div class="floating">🎯</div>
    <div class="floating">🚀</div>

    <div class="err-404"><span>4</span><span>0</span><span>4</span></div>
    <h1>הדף לא נמצא</h1>
    <p>נראה שהעמוד שחיפשת לא קיים או הועבר.</p>
    <a href="/" class="btn-home">← חזרה לדף הבית</a>

    <footer class="footer-404">
        © 2025 MP — Michael Papismedov · <a href="/legal.html">Terms</a>
    </footer>
</body>
</html>
