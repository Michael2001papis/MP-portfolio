<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="MP — Michael Papismedov | MP-PORTFOLIO-ID: 2025-MP-001">
    <title>יצירת קשר לפיתוח אתר רשמי | MP Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/First landing page/portfolio-professional.css">
    <style>
        .official-form-page { max-width: 500px; margin: 2rem auto; padding: 2rem 1rem; }
        .official-form-page h1 { font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; }
        .official-form-page .form { display: flex; flex-direction: column; gap: 1rem; }
        .official-form-page input, .official-form-page select {
            padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 1rem;
        }
        .official-form-page label { font-weight: 500; margin-bottom: 0.25rem; }
        .official-form-page .form-control { display: flex; flex-direction: column; }
        .official-form-page .btn-submit {
            padding: 0.85rem; background: linear-gradient(135deg, #276d42, #2d7a4a);
            color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .official-form-page .btn-submit:hover { opacity: 0.95; }
        .official-form-page .back-link {
            display: inline-block; margin-bottom: 1.5rem; color: #1e3a5f; text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="/index.html#contact" class="back-link">← חזרה</a>
    <main class="official-form-page">
        <h1>יצירת קשר לפיתוח אתר רשמי</h1>
        <form class="form" id="official-dev-form">
            <div class="form-control">
                <label for="client-first">שם פרטי</label>
                <input type="text" id="client-first" name="firstName" required placeholder="ישראל">
            </div>
            <div class="form-control">
                <label for="client-last">שם משפחה</label>
                <input type="text" id="client-last" name="lastName" required placeholder="ישראלי">
            </div>
            <div class="form-control">
                <label for="client-location">מיקום</label>
                <input type="text" id="client-location" name="location" placeholder="תל אביב">
            </div>
            <div class="form-control">
                <label for="site-type">סוג אתר</label>
                <select id="site-type" name="siteType" required>
                    <option value="">בחר...</option>
                    <option value="personal">אישי</option>
                    <option value="business">עסקי</option>
                    <option value="large-company">חברה גדולה</option>
                    <option value="blog">בלוג</option>
                    <option value="small-business">עסק קטן</option>
                    <option value="draft">אתר טיוטה</option>
                </select>
            </div>
            <div class="form-control">
                <label for="client-budget">תקציב (לא חובה)</label>
                <input type="text" id="client-budget" name="budget" placeholder="לדוגמה: 5,000-10,000 ₪">
            </div>
            <button type="submit" class="btn-submit">שלח פנייה</button>
        </form>
        <p id="official-form-msg" class="form-message" style="margin-top:1rem;text-align:center;"></p>
    </main>
    <script>
        document.getElementById('official-dev-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var fn = document.getElementById('client-first').value.trim();
            var ln = document.getElementById('client-last').value.trim();
            var loc = document.getElementById('client-location').value.trim();
            var type = document.getElementById('site-type').options[document.getElementById('site-type').selectedIndex].text;
            var budget = document.getElementById('client-budget').value.trim();
            if (!fn || !ln) {
                document.getElementById('official-form-msg').textContent = 'נא למלא שם פרטי ומשפחה';
                document.getElementById('official-form-msg').style.color = '#c53030';
                return;
            }
            if (!confirm('לשלוח את הפנייה? ייפתח דוא"ל עם הפרטים.')) return;
            var body = 'פנייה לפיתוח אתר רשמי\n\nשם: ' + fn + ' ' + ln + '\nמיקום: ' + loc + '\nסוג אתר: ' + type + '\nתקציב: ' + budget;
            var subject = 'פנייה לפיתוח אתר - ' + fn + ' ' + ln;
            window.location.href = 'mailto:dvnka2@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
            document.getElementById('official-form-msg').textContent = 'המייל נפתח. תודה!';
            document.getElementById('official-form-msg').style.color = '#1e3a5f';
            this.reset();
        });
    </script>
    <footer class="portfolio-footer" style="margin-top:2rem;text-align:center;">
        <p>© 2025 MP — Michael Papismedov · <a href="/legal.html">Terms</a></p>
    </footer>
    <script src="/scripts/ownership-console.js"></script>
</body>
</html>
