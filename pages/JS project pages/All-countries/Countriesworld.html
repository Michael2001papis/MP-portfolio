<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries of the World – JavaScript Project</title>
    <link rel="stylesheet" href="/styles/js-project-header.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body class="bg-light" dir="rtl">
    <header class="project-header">
        <h1>Countries of the World</h1>
        <p class="project-desc">Country explorer using REST API with dynamic search</p>
        <p class="project-tech">Technologies: HTML | CSS | JavaScript | REST API</p>
        <nav class="project-nav">
            <a href="/index.html">Back to Portfolio</a>
            <a href="/pages/עמודמעבריםכללי/index.html">View All Projects</a>
        </nav>

    <main class="project-app">
        <div id="loading-state" class="loading-state">Loading…</div>

        <div id="empty-state" class="empty-state" style="display:none;">No results found</div>
        <div id="search-area" style="display:none;">

            <input id="search-input" class="form-control m-auto mb-3" style="max-width:400px;" placeholder="Search by country name or code" />

        <div id="cards" class="d-flex flex-wrap justify-content-center"></div>

    <footer class="project-footer">
