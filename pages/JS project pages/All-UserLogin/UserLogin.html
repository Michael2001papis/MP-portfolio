<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login – JavaScript Project</title>
    <link rel="stylesheet" href="/styles/js-project-header.css">
    <link rel="stylesheet" href="./Ul.css">
    <script src="./Ul.js" defer></script>
</head>
<body dir="rtl">
    <header class="project-header">
        <h1>User Login</h1>
        <p class="project-desc">Client-side authentication interface with validation</p>
        <p class="project-tech">Technologies: HTML | CSS | JavaScript</p>
        <nav class="project-nav">
            <a href="/index.html">Back to Portfolio</a>
            <a href="/pages/עמודמעבריםכללי/index.html">View All Projects</a>
        </nav>
    </header>

    <main class="project-app">
        <div id="box001">
            <h2 id="LO">User Login</h2>
            <form action="" id="form">
                <div class="form-control">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" />
                    <p id="username-helper"></p>
                </div>
                <div class="form-control">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" />
                    <p id="email-helper"></p>
                </div>
                <div class="form-control">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"/>
                    <p id="password-helper"></p>
                </div>
                <input type="submit" class="btn-project" />
            </form>
        </div>
        <div id="output"></div>
    </main>

    <footer class="project-footer">
        <a href="/index.html">Back to Portfolio</a> · <a href="/pages/עמודמעבריםכללי/index.html">View All Projects</a>
    </footer>
</body>
</html>
