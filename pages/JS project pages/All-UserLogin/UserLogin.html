<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link rel="stylesheet" href="./Ul.css">
    <script src="./Ul.js" defer></script>
</head>
<body dir="rtl">
    <nav class="project-nav">
        <a href="/index.html">חזרה לעמוד הבית</a>
        <a href="/pages/עמודמעבריםכללי/index.html">לפרויקטים JS</a>
    </nav>
    <div id="box001">
        <h1 id="LO">User Login</h1>
        <form action="" id="form">
            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" />
                <p id="username-helper"></p>
            </div>
            <div class="form-control">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" />
                <p id="email-helper"></p>
            </div>
            <div class="form-control">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"/>
                <p id="password-helper"></p>
            </div>
            <input type="submit" />
        </form>
    </div>
    <div id="output"></div>
</body>
</html>
