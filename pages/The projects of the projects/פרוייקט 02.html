<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">

    <title> מיקרוסופט </title>

    <link rel="stylesheet" href="/styles/Pj1/פרוייקט 02.css">

</head>

<body>

    <!--/ תפריט עליונה /-->
    <div class="header">
        <img src="/images/Firstprojectphotos/Michael.img.webp" alt="תמונה שלי" id="imghdr">

        <!--/ לחצני מעבר /-->
        <nav>
            <ul id="ulhdr">
                <li><a href="/pages/LandingPage/עמודפרוייקטים.html" class="lihdr" target="_blank"> לעמוד הקודם </a></li>
                <li><a href="#container2" class="lihdr"> לטופס </a></li>
                <li><a href="/index.html" class="lihdr" target="_blank"> לעמוד הבית </a></li>
            </ul>
        </nav>

        <!--/ כפתור ההדהר שלי /-->

            <button>תופס הרשמה</button>
        </a>
    </div>

    <div class="container">

        <div class="top-section">

            <div class="content"></div>
        </div>
        <hr>

            <form id="container2">

                <h2>הרשמה למיקרוסופט</h2>

                <label for="name">שם מלא:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">אימייל:</label>
                <input type="email" id="email" name="email" required>

                <label for="about">ספר קצת על עצמך:</label>
                <textarea id="about" name="about" placeholder="כאן תוכל לכתוב על עצמך..." required></textarea>

                <a href="/pages/LandingPage/תודה.HTML"><button>שלח הרשמה</button></a>
                
            </form>
        </div>
    </div>
